<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة التقييمات | TDrive</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f8fa;
padding:30px;
color:#333;
}

h1{
text-align:center;
color:#65b7c3;
margin-bottom:35px;
font-size:36px;
}

.card{
background:#fff;
max-width:750px;
margin:20px auto;
padding:25px;
border-radius:18px;
border:1px solid #d9edf5;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.card h3{
color:#65b7c3;
margin-bottom:12px;
font-size:24px;
}

.card p{
margin:8px 0;
line-height:1.8;
}

button{
margin-top:20px;
padding:12px 22px;
background:#65b7c3;
color:#fff;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:.3s;
}

button:hover{
background:#54a9b8;
}

.empty{
text-align:center;
font-size:20px;
color:#777;
margin-top:40px;
}

.count{
text-align:center;
margin-bottom:25px;
font-size:18px;
font-weight:bold;
color:#666;
}

</style>

</head>

<body>

<h1>التقييمات الجديدة</h1>

<div id="reviews"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyDEjf_HrBdJSn1EVaHeyvMubUkPjVZH5i0",
authDomain:"tdrive-4fed8.firebaseapp.com",
projectId:"tdrive-4fed8",
storageBucket:"tdrive-4fed8.firebasestorage.app",
messagingSenderId:"107257320648",
appId:"1:107257320648:web:30d142684f936a374041fd"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("reviews");

const q = query(
collection(db,"reviews"),
where("status","==","pending")
);

const snap = await getDocs(q);

if(snap.empty){

container.innerHTML = `
<p class="empty">لا توجد تقييمات جديدة.</p>
`;

}else{

container.innerHTML += `
<p class="count">
عدد التقييمات الجديدة: ${snap.size}
</p>
`;

snap.forEach((d)=>{

const data = d.data();

container.innerHTML += `

<div class="card">

<h3>${data.program}</h3>

<p><strong>التقييم:</strong> ⭐ ${data.rating}/5</p>

<p><strong>التعليق:</strong></p>

<p>${data.comment}</p>

<button onclick="approve('${d.id}')">
نشر بالموقع
</button>

</div>

`;

});

}

window.approve = async(id)=>{

await updateDoc(doc(db,"reviews",id),{

status:"approved"

});

alert("تم نشر التقييم بنجاح.");

location.reload();

};

</script>

</body>
</html>
