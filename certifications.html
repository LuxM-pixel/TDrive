<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TDrive | الشهادات</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="certifications.css">

</head>

<body>

<div class="page">

    <!-- لوحة التحكم -->

    <div class="toolbar">

        <h1>إصدار شهادة</h1>

        <div class="row">

            <label>اسم المتدربة</label>

            <input
                type="text"
                id="name"
                placeholder="اكتبي اسم المتدربة">

        </div>

        <div class="row">

            <label>اسم البرنامج</label>

            <select id="program">

                <option>احترفِ القيادة على الطريق</option>
                <option>الكابتن المحترف</option>

            </select>

        </div>

        <div class="row">

            <label>التاريخ</label>

            <input
                type="date"
                id="date">

        </div>

        <button onclick="printCertificate()">

            🖨️ طباعة الشهادة

        </button>

    </div>

    <!-- الشهادة -->

    <div class="certificate" id="certificate">

        <div class="left-banner"></div>

        <div class="logo-circle">

            <div class="logo-inner">

                <h2>T</h2>

                <p>Drive</p>

            </div>

        </div>

        <div class="content">

            <h2 class="title">

                شهادة إتمام دورة

            </h2>

            <div class="certificate-intro">

                تشهد

                <span class="brand-name">

                    TDrive

                </span>

                بأن المتدربة

            </div>

            <div id="studentName">

            </div>

            <div class="name-line"></div>
                        <div class="certificate-text">

                قد أتمت بنجاح برنامج

            </div>

            <div id="programName">

                احترفِ القيادة على الطريق

            </div>

            <div class="certificate-message">

                ونتمنى لها دوام التوفيق والنجاح
                <br>
                في مسيرتها المهنية.

            </div>

            <!-- التذييل -->

            <div class="certificate-footer">

                <div class="manager-section">

                    <div class="manager-title">

                        مدير TDrive

                    </div>

                    <div class="manager-name">

                        منى حمود

                    </div>

                </div>

                <div class="certificate-badge">

                    🏅

                </div>

                <div class="date-section">

                    <div class="date-title">

                        تاريخ الإصدار

                    </div>

                    <div id="certificateDate">

                        09 / 07 / 2026

                    </div>

                </div>

            </div>

        </div>

    </div>
    </div>

<script src="certifications.js"></script>

</body>

</html>
