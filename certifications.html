<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TDrive | الشهادات</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- لوحة التحكم -->

<aside class="editor-sidebar">

<h2>بيانات الشهادة</h2>

<div class="input-group">
<label>اسم المتدربة</label>
<input id="studentInput" value="فلانه الفلاني">
</div>

<div class="input-group">
<label>اسم الدورة</label>
<input id="programInput" value="برنامج احتراف القيادة على الطريق">
</div>

<div class="input-group">
<label>عدد الساعات</label>
<input id="hoursInput" value="5">
</div>

<div class="input-group">
<label>التاريخ</label>
<input id="dateInput" value="26 مايو 2024">
</div>

<button id="printBtn" class="btn-download">
طباعة الشهادة
</button>

</aside>

<!-- منطقة المعاينة -->

<div class="preview-container">

<div class="certificate-canvas">

<!-- الإطار -->

<div class="corner-border top-left"></div>
<div class="corner-border top-right"></div>
<div class="corner-border bottom-left"></div>
<div class="corner-border bottom-right"></div>

<!-- الشريط -->

<div class="left-ribbon">

<div class="ribbon-circle">

<div class="logo-title">TDrive</div>

<div class="logo-sub">
تكنولوجيا القيادة
</div>

</div>

</div>

<!-- المحتوى -->

<div class="main-content">

<h1 class="cert-title">
شهادة إتمام دورة
</h1>

<div class="title-divider">

<div class="line-left"></div>

<div class="center-dot"></div>

<div class="line-right"></div>

</div>

<p class="cert-witness">

تشهد

<span class="brand-text">
TDrive
</span>

بأن المتدربة

</p>

<div class="diamond-divider">
◆
</div>

<h2 id="studentName" class="student-name">

فلانه الفلاني

</h2>

<div class="details-block">

<p class="cert-details">

قد أكملت

<span id="hoursValue">

5

</span>

ساعات تدريب في

</p>

<p id="programName" class="program-name">

برنامج احتراف القيادة على الطريق

</p>

</div>

<!-- الفوتر -->

<div class="cert-footer">

<!-- المدير -->

<div class="footer-col">

<div class="manager-title">

مدير TDrive

</div>

<div class="manager-name">

منى حمود

</div>

</div>

<!-- التاريخ -->

<div class="footer-col seal-col">

<div class="seal-wrap">

<div class="inner-seal">

★

</div>

</div>

<div id="dateValue" class="date-val">

26 مايو 2024

</div>

<div class="col-label">

التاريخ

</div>

</div>

<!-- التوقيع -->

<div class="footer-col">

<div class="signature-wrap">

<span class="signature-mock">

Anna clae

</span>

</div>

<div class="col-label">

التوقيع

</div>

</div>

</div>

<!-- الشعار السفلي -->

<div class="bottom-motto">

<div class="motto-line"></div>

<div class="motto-text">

تعلم قد بأمان، وصلك سيارتك بثقة

</div>

<div class="motto-line"></div>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
