<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُنشئ شهادات TDrive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
   <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="certifications.css">

</head>
<body>

    <div class="editor-sidebar" id="editorSidebar">
        <h2>لوحة التحكم بالشهادة</h2>
        <div class="input-group">
            <label for="inputName">اسم المتدربة:</label>
            <input type="text" id="inputName" value="فلانه الفلاني" placeholder="أدخل اسم المتدربة">
        </div>
        <div class="input-group">
            <label for="inputHours">عدد الساعات:</label>
            <input type="number" id="inputHours" value="5" placeholder="أدخل عدد الساعات">
        </div>
        <div class="input-group">
            <label for="inputProgram">اسم البرنامج:</label>
            <input type="text" id="inputProgram" value="برنامج احتراف القيادة على الطريق" placeholder="أدخل اسم البرنامج">
        </div>
        <div class="input-group">
            <label for="inputDate">التاريخ:</label>
            <input type="text" id="inputDate" value="26 مايو 2024" placeholder="أدخل التاريخ">
        </div>
        <div class="input-group">
            <label for="inputManager">مدير TDrive:</label>
            <input type="text" id="inputManager" value="منى حمود" placeholder="أدخل اسم المدير">
        </div>
        <button id="downloadBtn" class="btn-download">تحميل الشهادة (PDF)</button>
    </div>

    <div class="preview-container">
        <div id="certificate" class="certificate-canvas">
            
            <div class="corner-border top-left"></div>
            <div class="corner-border top-right"></div>
            <div class="corner-border bottom-left"></div>
            <div class="corner-border bottom-right"></div>

            <div class="left-panel">
                <div class="badge-container">
                    <div class="badge-circle">
                        <div class="badge-title">TDrive</div>
                        <div class="badge-subtitle">تكنولوجيا القيادة</div>
                        <div class="badge-decoration">
                            <span class="dot"></span>
                            <span class="line"></span>
                            <span class="dot"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="main-content">
                
                <h1 class="cert-title">شهادة إتمام دورة</h1>
                
                <div class="title-divider">
                    <span class="line-left"></span>
                    <span class="center-dot"></span>
                    <span class="line-right"></span>
                </div>

                <p class="cert-witness">تشهد <span class="brand-text">TDrive</span> بأن المتدربة</p>

                <div class="diamond-divider">♦</div>

                <h2 class="student-name" id="certName">فلانه الفلاني</h2>

                <div class="details-block">
                    <p class="cert-details">
                        قد أكملت <span id="certHours">5</span> ساعات تدريب في
                    </p>
                    <p class="program-name" id="certProgram">برنامج احتراف القيادة على الطريق</p>
                </div>

                <div class="cert-footer">
                    
                    <div class="footer-col signature-col">
                        <div class="signature-wrap">
                            <span class="signature-mock">Amna clae</span>
                        </div>
                        <div class="col-label">التوقيع</div>
                    </div>

                    <div class="footer-col seal-col">
                        <div class="divider-vertical"></div>
                        <div class="seal-wrap">
                            <div class="inner-seal">
                                <span class="star">★</span>
                                <div class="laurel-wreath"></div>
                            </div>
                        </div>
                        <div class="date-val" id="certDate">26 مايو 2024</div>
                        <div class="col-label">التاريخ</div>
                        <div class="divider-vertical"></div>
                    </div>

                    <div class="footer-col manager-col">
                        <div class="manager-title">مديرة TDrive</div>
                        <div class="manager-name" id="certManager">منى حمود</div>
                    </div>

                </div>

                <div class="bottom-motto">
                    <span class="motto-line"></span>
                    <span class="motto-text">تعلم قد بأمان، وصلك سيارتك بثقة</span>
                    <span class="motto-line"></span>
                </div>

            </div>

        </div>
    </div>

    <script src="certifications.js"></script>
</body>
</html>
