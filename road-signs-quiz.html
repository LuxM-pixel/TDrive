
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار علامات الطريق – TDrive</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:    #1a3a5c;
  --navy2:   #0f2540;
  --blue:    #2e6da4;
  --orange:  #e8832a;
  --gold:    #f5c518;
  --white:   #ffffff;
  --off:     #f4f7fb;
  --gray:    #64748b;
  --light:   #e2eaf3;
  --green:   #16a34a;
  --green-bg:#dcfce7;
  --red:     #dc2626;
  --red-bg:  #fee2e2;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Cairo', sans-serif;
  background: var(--off);
  color: var(--navy);
  direction: rtl;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--navy2) 0%, var(--navy) 60%, var(--blue) 100%);
  padding: 28px 20px 38px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 5px;
  background: repeating-linear-gradient(90deg, var(--gold) 0, var(--gold) 36px, transparent 36px, transparent 72px);
  opacity: 0.7;
}

.header-badge {
  display: inline-block;
  background: rgba(232,131,42,0.18);
  border: 1px solid rgba(232,131,42,0.4);
  color: var(--gold);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 14px;
  border-radius: 50px;
  margin-bottom: 12px;
}

.header h1 {
  font-size: clamp(22px, 4vw, 32px);
  font-weight: 900;
  color: var(--white);
  margin-bottom: 6px;
}

.header h1 span { color: var(--orange); }

.header p {
  font-size: 13px;
  color: rgba(255,255,255,0.65);
}

/* Progress */
.progress-wrap {
  max-width: 600px;
  margin: -16px auto 0;
  padding: 0 16px;
  position: relative;
  z-index: 2;
}

.progress-card {
  background: var(--white);
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(26,58,92,0.12);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.progress-info { flex: 1; }

.progress-bar-track {
  height: 7px;
  background: var(--light);
  border-radius: 50px;
  overflow: hidden;
  margin-top: 6px;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--orange));
  border-radius: 50px;
  transition: width 0.5s ease;
  width: 0%;
}

.progress-counter {
  text-align: center;
  min-width: 48px;
}

.progress-counter .num { font-size: 20px; font-weight: 900; color: var(--navy); line-height: 1; }
.progress-counter .num span { color: var(--orange); }
.progress-counter .lbl { font-size: 9px; color: var(--gray); margin-top: 2px; }

.score-counter { text-align: center; min-width: 48px; }
.score-counter .num { font-size: 20px; font-weight: 900; color: var(--green); line-height: 1; }
.score-counter .lbl { font-size: 9px; color: var(--gray); margin-top: 2px; }

/* Main */
.main { max-width: 600px; margin: 0 auto; padding: 20px 16px 60px; }

/* Question card */
.question-card {
  background: var(--white);
  border-radius: 20px;
  box-shadow: 0 2px 16px rgba(26,58,92,0.08);
  overflow: hidden;
  display: none;
}

.question-card.active { display: block; animation: fadeSlide 0.35s ease; }

@keyframes fadeSlide {
  from { opacity: 0; transform: translateX(-16px); }
  to   { opacity: 1; transform: translateX(0); }
}

.q-header {
  background: var(--off);
  border-bottom: 1px solid var(--light);
  padding: 12px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.q-number {
  width: 30px; height: 30px;
  background: var(--navy);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 900;
  flex-shrink: 0;
}

.q-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--orange);
}

.q-body { padding: 24px 20px; }

.q-text {
  font-size: 15px;
  font-weight: 700;
  color: var(--navy);
  text-align: center;
  margin-bottom: 18px;
}

/* Sign display */
.sign-display {
  display: flex;
  justify-content: center;
  margin-bottom: 22px;
}

.sign-display svg {
  width: 110px;
  height: 110px;
  filter: drop-shadow(0 6px 12px rgba(0,0,0,0.15));
}

/* Options */
.options { display: grid; gap: 10px; }

.option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  border: 2px solid var(--light);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--off);
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  position: relative;
}

.option:hover:not(.disabled) {
  border-color: var(--blue);
  background: white;
  transform: translateX(-2px);
}

.option-letter {
  width: 28px; height: 28px;
  border: 2px solid var(--light);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 900;
  color: var(--gray);
  flex-shrink: 0;
  background: white;
  transition: all 0.2s;
}

.option.selected { border-color: var(--blue); background: rgba(46,109,164,0.07); }
.option.selected .option-letter { background: var(--blue); border-color: var(--blue); color: white; }

.option.correct { border-color: var(--green) !important; background: var(--green-bg) !important; }
.option.correct .option-letter { background: var(--green) !important; border-color: var(--green) !important; color: white !important; }

.option.wrong { border-color: var(--red) !important; background: var(--red-bg) !important; }
.option.wrong .option-letter { background: var(--red) !important; border-color: var(--red) !important; color: white !important; }

.option.disabled { cursor: not-allowed; opacity: 0.75; }

.option-icon { position: absolute; left: 14px; font-size: 16px; display: none; }
.option.correct .option-icon, .option.wrong .option-icon { display: block; }

/* Explanation */
.explanation {
  margin-top: 14px;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.7;
  display: none;
}

.explanation.show { display: block; }
.explanation.correct-exp { background: var(--green-bg); border: 1px solid #86efac; color: #166534; }
.explanation.wrong-exp   { background: var(--red-bg);   border: 1px solid #fca5a5; color: #991b1b; }

/* Navigation */
.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; gap: 12px; }

.btn-nav {
  padding: 12px 22px;
  border: none;
  border-radius: 10px;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-prev { background: var(--light); color: var(--navy); }
.btn-prev:hover { background: var(--blue); color: white; }
.btn-prev:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-next {
  background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
  color: white;
  flex: 1;
  box-shadow: 0 3px 12px rgba(26,58,92,0.2);
}

.btn-next:hover { transform: translateY(-1px); }
.btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-submit-quiz {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, var(--orange) 0%, #c96e1e 100%);
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(232,131,42,0.35);
  transition: all 0.2s;
  display: none;
  margin-top: 18px;
}

.btn-submit-quiz:hover { transform: translateY(-1px); }

/* Dots */
.q-dots { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }

.q-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--light);
  background: var(--white);
  font-size: 11px;
  font-weight: 700;
  color: var(--gray);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
}

.q-dot.current { border-color: var(--blue); background: var(--blue); color: white; }
.q-dot.answered-correct { border-color: var(--green); background: var(--green); color: white; }
.q-dot.answered-wrong   { border-color: var(--red);   background: var(--red);   color: white; }

/* Results */
.results-screen { display: none; animation: fadeSlide 0.4s ease; }
.results-screen.show { display: block; }

.results-hero {
  text-align: center;
  padding: 32px 20px 24px;
  background: var(--white);
  border-radius: 20px;
  box-shadow: 0 2px 16px rgba(26,58,92,0.08);
  margin-bottom: 16px;
}

.score-ring { width: 140px; height: 140px; margin: 0 auto 20px; position: relative; }
.score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.score-ring circle.track { fill: none; stroke: var(--light); stroke-width: 10; }
.score-ring circle.fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1); }

.score-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.score-pct { font-size: 32px; font-weight: 900; line-height: 1; }
.score-sub { font-size: 11px; color: var(--gray); margin-top: 2px; }

.result-title { font-size: 24px; font-weight: 900; margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--gray); margin-bottom: 20px; }

.result-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }

.stat-box { background: var(--off); border-radius: 12px; padding: 14px 8px; text-align: center; }
.stat-box .s-num { font-size: 26px; font-weight: 900; line-height: 1; }
.stat-box .s-lbl { font-size: 11px; color: var(--gray); margin-top: 4px; }
.stat-box.correct .s-num { color: var(--green); }
.stat-box.wrong .s-num { color: var(--red); }

.btn-retry {
  width: 100%;
  padding: 14px;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-retry:hover { background: var(--blue); }

/* Review */
.review-list { display: grid; gap: 12px; }

.review-item {
  background: var(--white);
  border-radius: 14px;
  box-shadow: 0 2px 10px rgba(26,58,92,0.07);
  overflow: hidden;
}

.review-item-header {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--light);
}

.review-status { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.review-status.c { background: var(--green-bg); }
.review-status.w { background: var(--red-bg); }

.review-sign-mini svg { width: 32px; height: 32px; flex-shrink: 0; }

.review-q-text { font-size: 13px; font-weight: 600; color: var(--navy); flex: 1; line-height: 1.4; }

.review-item-body { padding: 12px 16px; font-size: 12px; color: var(--gray); line-height: 1.7; }

.review-answer { display: flex; gap: 8px; margin-top: 6px; font-size: 12px; }
.ra-label { font-weight: 700; }
.ra-val-correct { color: var(--green); font-weight: 700; }
.ra-val-wrong { color: var(--red); font-weight: 700; }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">🚦 اختبار علامات الطريق</div>
  <h1>تعرّفي على <span>العلامات</span></h1>
  <p>١٠ علامات – اختاري الإجابة الصحيحة لكل علامة</p>
</div>

<div class="progress-wrap">
  <div class="progress-card">
    <div class="progress-counter">
      <div class="num"><span id="q-current">1</span>/10</div>
      <div class="lbl">سؤال</div>
    </div>
    <div class="progress-info">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>
    <div class="score-counter">
      <div class="num" id="score-current">0</div>
      <div class="lbl">صحيح</div>
    </div>
  </div>
</div>

<div class="main">
  <div class="q-dots" id="q-dots"></div>
  <div id="questions-container"></div>

  <div class="nav-row" id="nav-row">
    <button class="btn-nav btn-prev" id="btn-prev" onclick="goQuestion(-1)">← السابق</button>
    <button class="btn-nav btn-next" id="btn-next" onclick="goQuestion(1)">التالي ←</button>
  </div>
  <button class="btn-submit-quiz" id="btn-submit" onclick="submitQuiz()">
    ✅ إنهاء الاختبار وعرض النتيجة
  </button>

  <div class="results-screen" id="results-screen">
    <div class="results-hero">
      <div class="score-ring">
        <svg viewBox="0 0 140 140">
          <circle class="track" cx="70" cy="70" r="60"/>
          <circle class="fill" id="score-circle" cx="70" cy="70" r="60" stroke-dasharray="377" stroke-dashoffset="377"/>
        </svg>
        <div class="score-label">
          <div class="score-pct" id="score-pct">0%</div>
          <div class="score-sub">النتيجة</div>
        </div>
      </div>
      <div class="result-title" id="result-title">—</div>
      <div class="result-sub" id="result-sub">—</div>
      <div class="result-stats">
        <div class="stat-box correct"><div class="s-num" id="r-correct">—</div><div class="s-lbl">إجابات صحيحة</div></div>
        <div class="stat-box wrong"><div class="s-num" id="r-wrong">—</div><div class="s-lbl">إجابات خاطئة</div></div>
      </div>
      <button class="btn-retry" onclick="retryQuiz()">🔄 إعادة الاختبار</button>
    </div>

    <div style="font-size:13px;font-weight:700;color:var(--gray);margin:20px 0 10px;padding-right:4px;">مراجعة الإجابات:</div>
    <div class="review-list" id="review-list"></div>
  </div>
</div>

<script>
// ── SVG signs ────────────────────────────────────────────────────────────────
function svgNoStop() {
  return `<svg viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="#2e6da4" stroke="#1a3a5c" stroke-width="2"/>
    <circle cx="50" cy="50" r="35" fill="none" stroke="#dc2626" stroke-width="9"/>
    <line x1="26" y1="26" x2="74" y2="74" stroke="#dc2626" stroke-width="8"/>
    <line x1="74" y1="26" x2="26" y2="74" stroke="#dc2626" stroke-width="8"/>
  </svg>`;
}
function svgNoEntry() {
  return `<svg viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="#dc2626" stroke="#8b0000" stroke-width="3"/>
    <rect x="20" y="42" width="60" height="16" fill="white"/>
  </svg>`;
}
function svgNoVehicles() {
  return `<svg viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="white" stroke="#dc2626" stroke-width="9"/>
  </svg>`;
}
function svgMaxSpeed() {
  return `<svg viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="white" stroke="#dc2626" stroke-width="9"/>
    <text x="50" y="63" text-anchor="middle" font-family="Arial" font-size="30" font-weight="bold" fill="#1a1a1a">60</text>
  </svg>`;
}
function svgGiveWay() {
  return `<svg viewBox="0 0 100 90">
    <polygon points="50,85 5,5 95,5" fill="white" stroke="#dc2626" stroke-width="7"/>
    <polygon points="50,72 18,18 82,18" fill="#dc2626"/>
  </svg>`;
}
function svgStop() {
  return `<svg viewBox="0 0 100 100">
    <polygon points="35,5 65,5 95,35 95,65 65,95 35,95 5,65 5,35" fill="#dc2626" stroke="#8b0000" stroke-width="3"/>
    <text x="50" y="58" text-anchor="middle" font-family="Cairo,Arial" font-size="22" font-weight="bold" fill="white">قف</text>
  </svg>`;
}
function svgStraightAhead() {
  return `<svg viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="#2e6da4" stroke="#1a3a5c" stroke-width="2"/>
    <line x1="50" y1="75" x2="50" y2="30" stroke="white" stroke-width="9" stroke-linecap="round"/>
    <polygon points="50,18 35,40 65,40" fill="white"/>
  </svg>`;
}
function svgTurnRight() {
  return `<svg viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="#2e6da4" stroke="#1a3a5c" stroke-width="2"/>
    <path d="M 30 35 L 30 65 L 65 65" fill="none" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="78,65 58,52 58,78" fill="white"/>
  </svg>`;
}
function svgPedestrian() {
  return `<svg viewBox="0 0 100 90">
    <polygon points="50,5 95,85 5,85" fill="#f5c518" stroke="#dc2626" stroke-width="6"/>
    <circle cx="50" cy="38" r="6" fill="#1a1a1a"/>
    <path d="M 50 46 L 50 62 M 50 50 L 38 58 M 50 50 L 62 58 M 50 62 L 40 75 M 50 62 L 60 75" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round" fill="none"/>
    <line x1="20" y1="80" x2="80" y2="80" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="25" y1="80" x2="20" y2="73" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="35" y1="80" x2="30" y2="73" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="45" y1="80" x2="40" y2="73" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="55" y1="80" x2="50" y2="73" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="65" y1="80" x2="60" y2="73" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="75" y1="80" x2="70" y2="73" stroke="#1a1a1a" stroke-width="3"/>
  </svg>`;
}
function svgBump() {
  return `<svg viewBox="0 0 100 90">
    <polygon points="50,5 95,85 5,85" fill="#f5c518" stroke="#dc2626" stroke-width="6"/>
    <path d="M 20 70 Q 50 45 80 70" fill="none" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>
  </svg>`;
}

// ── Questions data ──────────────────────────────────────────────────────────
const QUESTIONS = [
  {
    sign: svgNoStop(),
    text: 'ماذا تعني هذه العلامة؟',
    options: ['ممنوع الدخول', 'ممنوع الوقوف والانتظار', 'السرعة القصوى', 'أفسح الطريق'],
    correct: 1,
    explanation: 'تمنع الوقوف والانتظار في هذا المكان منعاً باتاً.'
  },
  {
    sign: svgNoEntry(),
    text: 'ماذا تعني هذه العلامة؟',
    options: ['ممنوع الدخول', 'ممنوع السير لجميع المركبات', 'قف', 'اتجاه إجباري مستقيم'],
    correct: 0,
    explanation: 'ممنوع دخول جميع المركبات من هذا الاتجاه.'
  },
  {
    sign: svgNoVehicles(),
    text: 'ماذا تعني هذه العلامة؟',
    options: ['ممنوع الدخول', 'أفسح الطريق', 'ممنوع السير لجميع المركبات', 'السرعة القصوى'],
    correct: 2,
    explanation: 'ممنوع السير لجميع المركبات في هذا الطريق.'
  },
  {
    sign: svgMaxSpeed(),
    text: 'ماذا تعني هذه العلامة؟',
    options: ['ممر مشاة', 'السرعة القصوى 60 كم/س', 'مطبات', 'اتجاه إجباري يمين'],
    correct: 1,
    explanation: 'السرعة القصوى المسموح بها هي 60 كم/س.'
  },
  {
    sign: svgGiveWay(),
    text: 'ماذا تعني هذه العلامة؟',
    options: ['قف', 'أفسح الطريق', 'ممنوع الدخول', 'اتجاه إجباري مستقيم'],
    correct: 1,
    explanation: 'يجب إفساح الطريق للمركبات القادمة في الطريق الرئيسي.'
  },
  {
    sign: svgStop(),
    text: 'ماذا تعني هذه العلامة؟',
    options: ['أفسح الطريق', 'مطبات', 'قف', 'ممنوع السير لجميع المركبات'],
    correct: 2,
    explanation: 'يجب التوقف التام وإعطاء الأفضلية ثم المتابعة بحذر.'
  },
  {
    sign: svgStraightAhead(),
    text: 'ماذا تعني هذه العلامة؟',
    options: ['اتجاه إجباري يمين', 'اتجاه إجباري مستقيم', 'ممر مشاة', 'ممنوع الدخول'],
    correct: 1,
    explanation: 'يسمح بالسير فقط في الاتجاه الأمامي.'
  },
  {
    sign: svgTurnRight(),
    text: 'ماذا تعني هذه العلامة؟',
    options: ['اتجاه إجباري مستقيم', 'مطبات', 'اتجاه إجباري يمين', 'السرعة القصوى'],
    correct: 2,
    explanation: 'يجب الانعطاف إلى اليمين فقط.'
  },
  {
    sign: svgPedestrian(),
    text: 'ماذا تعني هذه العلامة؟',
    options: ['مطبات', 'ممر مشاة', 'قف', 'أفسح الطريق'],
    correct: 1,
    explanation: 'وجود ممر مشاة أمامك، يجب تخفيف السرعة والانتباه.'
  },
  {
    sign: svgBump(),
    text: 'ماذا تعني هذه العلامة؟',
    options: ['ممر مشاة', 'ممنوع الدخول', 'مطبات', 'اتجاه إجباري يمين'],
    correct: 2,
    explanation: 'وجود مطبات أو مرتفع في الطريق أمامك، خففي السرعة.'
  }
];

// ── State ───────────────────────────────────────────────────────────────────
let current = 0;
let answers = new Array(QUESTIONS.length).fill(null);
let answered = new Array(QUESTIONS.length).fill(false);

// ── Build UI ─────────────────────────────────────────────────────────────────
function buildQuiz() {
  const container = document.getElementById('questions-container');
  const dotsEl    = document.getElementById('q-dots');
  container.innerHTML = '';
  dotsEl.innerHTML = '';

  QUESTIONS.forEach((q, i) => {
    const dot = document.createElement('div');
    dot.className = 'q-dot' + (i === 0 ? ' current' : '');
    dot.textContent = i + 1;
    dot.onclick = () => jumpToQuestion(i);
    dot.id = `dot-${i}`;
    dotsEl.appendChild(dot);

    const card = document.createElement('div');
    card.className = 'question-card' + (i === 0 ? ' active' : '');
    card.id = `q-card-${i}`;

    const letters = ['أ', 'ب', 'ج', 'د'];
    const optionsHTML = q.options.map((opt, oi) => `
      <div class="option" id="opt-${i}-${oi}" onclick="selectOption(${i}, ${oi})">
        <div class="option-letter">${letters[oi]}</div>
        <span>${opt}</span>
        <span class="option-icon"></span>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="q-header">
        <div class="q-number">${i + 1}</div>
        <div class="q-label">علامات المرور</div>
      </div>
      <div class="q-body">
        <div class="sign-display">${q.sign}</div>
        <div class="q-text">${q.text}</div>
        <div class="options">${optionsHTML}</div>
        <div class="explanation" id="exp-${i}"></div>
      </div>
    `;
    container.appendChild(card);
  });

  updateNav();
  updateScore();
}

// ── Option selection ─────────────────────────────────────────────────────────
function selectOption(qIdx, optIdx) {
  if (answered[qIdx]) return;

  answers[qIdx] = optIdx;
  answered[qIdx] = true;
  const q = QUESTIONS[qIdx];

  q.options.forEach((_, oi) => {
    const el = document.getElementById(`opt-${qIdx}-${oi}`);
    el.classList.add('disabled');
    if (oi === q.correct) {
      el.classList.add('correct');
      el.querySelector('.option-icon').textContent = '✓';
    }
    if (oi === optIdx && oi !== q.correct) {
      el.classList.add('wrong');
      el.querySelector('.option-icon').textContent = '✗';
    }
  });

  const exp = document.getElementById(`exp-${qIdx}`);
  exp.textContent = q.explanation;
  exp.className = 'explanation show ' + (optIdx === q.correct ? 'correct-exp' : 'wrong-exp');

  const dot = document.getElementById(`dot-${qIdx}`);
  dot.classList.remove('current');
  dot.classList.add(optIdx === q.correct ? 'answered-correct' : 'answered-wrong');

  updateScore();
  updateNav();


// ── Navigation ───────────────────────────────────────────────────────────────
function goQuestion(dir) {
  const next = current + dir;
  if (next < 0 || next >= QUESTIONS.length) return;
  showQuestion(next);
}

function jumpToQuestion(idx) { showQuestion(idx); }

function showQuestion(idx) {
  document.getElementById(`q-card-${current}`)?.classList.remove('active');
  document.getElementById(`dot-${current}`)?.classList.remove('current');

  current = idx;
  document.getElementById(`q-card-${current}`).classList.add('active');
  if (!answered[current]) document.getElementById(`dot-${current}`).classList.add('current');

  document.getElementById('q-current').textContent = current + 1;
  updateNav();
}

function updateNav() {
  const allAnswered = answered.every(Boolean);
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === QUESTIONS.length - 1;
  document.getElementById('btn-submit').style.display = allAnswered ? 'block' : 'none';
  document.getElementById('nav-row').style.display = allAnswered ? 'none' : 'flex';

  const done = answered.filter(Boolean).length;
  const pct  = (done / QUESTIONS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function updateScore() {
  const correct = answers.filter((a, i) => a === QUESTIONS[i].correct).length;
  document.getElementById('score-current').textContent = correct;
}

// ── Submit ────────────────────────────────────────────────────────────────────
function submitQuiz() {
  const correct = answers.filter((a, i) => a === QUESTIONS[i].correct).length;
  const wrong   = QUESTIONS.length - correct;
  const pct     = Math.round((correct / QUESTIONS.length) * 100);

  document.getElementById('q-dots').style.display = 'none';
  document.getElementById('questions-container').style.display = 'none';
  document.getElementById('nav-row').style.display = 'none';
  document.getElementById('btn-submit').style.display = 'none';

  const rs = document.getElementById('results-screen');
  rs.classList.add('show');

  const circle = document.getElementById('score-circle');
  const circumference = 377;
  const offset = circumference - (pct / 100) * circumference;
  const ringColor = pct >= 70 ? '#16a34a' : pct >= 50 ? '#e8832a' : '#dc2626';
  circle.style.stroke = ringColor;
  setTimeout(() => { circle.style.strokeDashoffset = offset; }, 100);

  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('score-pct').style.color = ringColor;

  let title, sub;
  if (pct >= 80) { title = '🏆 ممتاز!'; sub = 'تتقنين علامات الطريق بشكل رائع!'; }
  else if (pct >= 60) { title = '👍 جيد'; sub = 'نتيجة جيدة، راجعي العلامات اللي أخطأتِ فيها'; }
  else { title = '📚 تحتاجين مراجعة'; sub = 'راجعي جدول العلامات وأعيدي الاختبار'; }

  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent   = sub;
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent   = wrong;

  const reviewEl = document.getElementById('review-list');
  reviewEl.innerHTML = QUESTIONS.map((q, i) => {
    const isCorrect = answers[i] === q.correct;
    const letters   = ['أ', 'ب', 'ج', 'د'];
    return `
      <div class="review-item">
        <div class="review-item-header">
          <div class="review-status ${isCorrect ? 'c' : 'w'}">${isCorrect ? '✓' : '✗'}</div>
          <div class="review-sign-mini">${q.sign}</div>
          <div class="review-q-text">سؤال ${i + 1}</div>
        </div>
        <div class="review-item-body">
          ${!isCorrect ? `<div class="review-answer"><span class="ra-label">إجابتك:</span><span class="ra-val-wrong">${letters[answers[i]]} – ${q.options[answers[i]]}</span></div>` : ''}
          <div class="review-answer"><span class="ra-label">الإجابة الصحيحة:</span><span class="ra-val-correct">${letters[q.correct]} – ${q.options[q.correct]}</span></div>
          <div style="margin-top:6px;color:#475569;">💡 ${q.explanation}</div>
        </div>
      </div>
    `;
  }).join('');
}

// ── Retry ─────────────────────────────────────────────────────────────────────
function retryQuiz() {
  answers  = new Array(QUESTIONS.length).fill(null);
  answered = new Array(QUESTIONS.length).fill(false);
  current  = 0;

  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('q-dots').style.display = 'flex';
  document.getElementById('questions-container').style.display = 'block';
  document.getElementById('nav-row').style.display = 'flex';
  document.getElementById('score-circle').style.strokeDashoffset = '377';

  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildQuiz();
</script>
</body>
</html>
