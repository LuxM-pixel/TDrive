<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>TDrive | الشهادات</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="certifications.css">

</head>

<body>

<div class="page">

    <!-- لوحة التحكم -->

    <section class="toolbar">

        <h1>

            إصدار شهادة

        </h1>

        <div class="row">

            <label>

                اسم المتدربة

            </label>

            <input
                id="name"
                type="text"
                placeholder="اكتبي اسم المتدربة">

        </div>

        <div class="row">

            <label>

                اسم البرنامج

            </label>

            <select id="program">

                <option>

                    احترفِ القيادة على الطريق

                </option>

                <option>

                    الكابتن المحترف

                </option>

            </select>

        </div>

        <div class="row">

            <label>

                التاريخ

            </label>

            <input
                id="date"
                type="date">

        </div>

        <button
            onclick="printCertificate()">

            🖨️ طباعة الشهادة

        </button>

    </section>
        <!-- الشهادة -->

    <section
        class="certificate"
        id="certificate">

        <div class="certificate-pattern"></div>

        <div class="left-banner">

            <div class="logo-circle">

                <div class="logo-inner">

                    <div class="logo-text">

                        <span class="logo-t">

                            TDrive

                        </span>

                        <span class="logo-ar">

                            تكنولوجيا القيادة

                        </span>

                    </div>

                </div>

            </div>

        </div>

        <div class="certificate-content">

            <h2 class="certificate-title">

                شهادة إتمام دورة

            </h2>

            <div class="title-divider">

                ───── ● ─────

            </div>

            <p class="certificate-intro">

                تشهد

                <span class="brand-name">

                    TDrive

                </span>

                بأن المتدربة

            </p>

            <div
                id="studentName"
                class="student-name">

                فلانة الفلاني

            </div>

            <div class="student-line"></div>

            <p class="certificate-text">

                قد أكملت 5 ساعات تدريب في

            </p>

         <div
    id="programName"
    class="program-name">

    احترف القيادة على الطريق

</div>

                           <div class="certificate-footer">

                <div class="signature-section">

                    <div class="signature-image">

                        ✍️

                    </div>

                    <div class="signature-line"></div>

                    <div class="signature-title">

                        التوقيع

                    </div>

                </div>

                <div class="date-section">

                    <div class="badge">

                        ★

                    </div>

                    <div
                        id="certificateDate"
                        class="certificate-date">

                        26 مايو 2024

                    </div>

                    <div class="date-title">

                        التاريخ

                    </div>

                </div>

                <div class="manager-section">

                    <div class="manager-title">

                        مدير TDrive

                    </div>

                    <div class="manager-name">

                        منى حمود

                    </div>

                </div>

            </div>

            <div class="footer-slogan">

                تعلم قد بأمان، وصلك سيارتك بثقة

            </div>

        </div>

    </section>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="certifications.js"></script>

</body>

</html>
